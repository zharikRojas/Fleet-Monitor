services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetmonitor-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet123
      POSTGRES_DB: fleetmonitor
    volumes:
      - fleetmonitor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleetmonitor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fleetmonitor_pgdata:
